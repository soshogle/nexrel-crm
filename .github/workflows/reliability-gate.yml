name: Reliability Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * *"

jobs:
  reliability-gate:
    runs-on: ubuntu-latest
    env:
      RELIABILITY_DATABASE_URL: ${{ secrets.RELIABILITY_DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reliability regression gate
        run: npm run reliability:gate

      - name: Live-run KPI gate (in-scope 95%+)
        if: ${{ env.RELIABILITY_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ env.RELIABILITY_DATABASE_URL }}
        run: npm run reliability:kpis -- --days=7 --target=0.95 --min-samples=10 --strict=true

      - name: Trend regression gate (week-over-week)
        if: ${{ env.RELIABILITY_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ env.RELIABILITY_DATABASE_URL }}
        run: npm run reliability:trend -- --window-days=7 --max-drop=0.03 --min-samples=10 --strict=true

      - name: Canary gate (latest 10 missions)
        if: ${{ env.RELIABILITY_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ env.RELIABILITY_DATABASE_URL }}
        run: npm run reliability:canary -- --sample-size=10 --min-success=0.95 --strict=true

      - name: Build reliability summary
        if: always()
        run: npm run reliability:summary

      - name: Upload acceptance matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-acceptance-matrix
          path: artifacts/reliability-acceptance-matrix.json
          if-no-files-found: ignore

      - name: Upload live-run KPI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-live-run-kpis
          path: artifacts/reliability-live-run-kpis.json
          if-no-files-found: ignore

      - name: Upload trend regression artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-trend-regression
          path: artifacts/reliability-trend-regression.json
          if-no-files-found: ignore

      - name: Upload canary report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-canary-report
          path: |
            artifacts/reliability-canary-report.json
            artifacts/reliability-canary-report.md
          if-no-files-found: ignore

      - name: Upload reliability summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-summary
          path: artifacts/reliability-summary.md
          if-no-files-found: ignore
