name: Reliability Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * *"

jobs:
  reliability-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reliability regression gate
        run: npm run reliability:gate

      - name: Live-run KPI gate (in-scope 95%+)
        if: ${{ secrets.RELIABILITY_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.RELIABILITY_DATABASE_URL }}
        run: npm run reliability:kpis -- --days=7 --target=0.95 --min-samples=10 --strict=true

      - name: Upload acceptance matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-acceptance-matrix
          path: artifacts/reliability-acceptance-matrix.json
          if-no-files-found: ignore

      - name: Upload live-run KPI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-live-run-kpis
          path: artifacts/reliability-live-run-kpis.json
          if-no-files-found: ignore
